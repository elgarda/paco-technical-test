<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Nouveau Vol</title>
    <style>
        .form-container { max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; font-family: sans-serif; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; padding: 10px 15px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Ajouter un vol</h2>
    <form th:action="@{/admin/flight}" th:object="${flight}" method="post">
        <div class="form-group">
            <label>Code IATA Origine (ex: CDG) :</label>
            <input type="text" th:field="*{origin.iata}" required />
        </div>
        <div class="form-group">
            <label>Code IATA Destination (ex: JFK) :</label>
            <input type="text" th:field="*{destination.iata}" required />
        </div>
        <div class="form-group">
            <label>Prix (€) :</label>
            <input type="number" step="0.01" th:field="*{price}" required />
        </div>
        <div class="form-group">
            <label>URL de l'image :</label>
            <input type="text" th:field="*{image}" />
        </div>
        <div class="form-group">
            <label>Date de Départ :</label>
            <input type="datetime-local" th:field="*{departure}" required />
        </div>
        <div class="form-group">
            <label>Date d'Arrivée :</label>
            <input type="datetime-local" th:field="*{arrival}" required />
        </div>
        <button type="submit">Créer le vol</button>
    </form>
    <p><a href="/">Annuler</a></p>
</div>
</body>
</html>
